[project]
name = "creativestudio-proto"
version = "0.1.0"
description = "CreativeStudio prototype - minimal launcher and plugin scaffold"
authors = [
  { name="masahiro", email="masahiro@example.com" },
]

[tool.poetry]
package-mode = false

[tool.poetry.dependencies]
python = ">=3.12,<3.13"
PySide6 = ">6.5"
pillow = ">=9.0"
numpy = ">=1.23"

[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"
