openapi: "3.0.0"
info:
  title: CreativeStudio Plugin API
  version: "0.1.0"
  description: |
    CreativeStudio 用プラグイン API (OpenAPI風)。
    プラグインは Python パッケージとして提供し、`register(app_api)` を実装します。
paths:
  /plugins/manifest:
    get:
      summary: プラグインマニフェスト取得
      responses:
        "200":
          description: プラグインの manifest JSON
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  version:
                    type: string
                  description:
                    type: string
  /plugins/{plugin}/actions/colorize:
    post:
      summary: 画像をカラーライズするジョブをキューイングして即時処理
      parameters:
        - name: plugin
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                input_path:
                  type: string
                  description: ローカルファイルパスまたは base64 データ（data:image/...;base64,）
                output_path:
                  type: string
                  description: 出力先パス
                method:
                  type: string
                  enum: [auto, model, heuristic]
                  description: "auto=モデルがあればmodelを試す。なければheuristic。"
              required: [input_path, output_path]
      responses:
        '200':
          description: ジョブ完了。レスポンスに出力ファイルパスを返す。
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  output_path:
                    type: string
        '400':
          description: 入力エラー
        '500':
          description: サーバー内部エラー
components:
  schemas:
    PluginManifest:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        entry:
          type: string
        description:
          type: string
