name: Plugin Smoke Test

on:
  push:
    paths:
      - 'app/**'
      - 'plugins/**'
      - 'tests/**'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'app/**'
      - 'plugins/**'
      - 'tests/**'
      - 'pyproject.toml'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Clean workspace caches
        run: |
          echo "Cleaning pytest and python cache directories..."
          rm -rf .pytest_cache || true
          find . -type d -name "__pycache__" -exec rm -rf {} + || true
          rm -rf .venv || true

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache Poetry and pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
            ~/.cache/pypi
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') || hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi

      - name: Run pytest (plugin smoke tests)
        id: pytest
        run: |
          python -m pytest -q --maxfail=1 || true

      - name: Upload pytest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-logs
          path: |
            ./tests
            ./app.log
            .pytest_cache || true

      - name: Fail if tests failed
        if: steps.pytest.outcome != 'success'
        run: |
          echo "Tests failed. See pytest artifacts for logs."
          exit 1
